{% extends "learning_logs/base.html" %}
{% load bootstrap4 %}

{% block page_header %}
  <h2>Add a New Entry for {{ topic }}</h2>
{% endblock page_header %}

{% block content %}
  <form method="post" class="form">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
      <button type="submit" class="btn btn-success">Add Entry</button>
    {% endbuttons %}
  </form>
{% endblock content %}
